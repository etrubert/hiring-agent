# Platform-specific entry points. Each scraper consumes its own block.
devpost:
  enabled: true
  search_urls:
    # France-specific — try to surface Paris / French hackathons
    - "https://devpost.com/api/hackathons?search=paris&status[]=upcoming&status[]=open"
    - "https://devpost.com/api/hackathons?search=paris&status[]=ended"
    - "https://devpost.com/api/hackathons?search=france&status[]=upcoming&status[]=open"
    - "https://devpost.com/api/hackathons?search=france&status[]=ended"
    - "https://devpost.com/api/hackathons?search=french&status[]=upcoming&status[]=open"
    - "https://devpost.com/api/hackathons?search=french&status[]=ended"
    - "https://devpost.com/api/hackathons?search=station+f&status[]=upcoming&status[]=open"
    - "https://devpost.com/api/hackathons?search=station+f&status[]=ended"
    - "https://devpost.com/api/hackathons?search=lyon&status[]=upcoming&status[]=open"
    - "https://devpost.com/api/hackathons?search=lyon&status[]=ended"
    - "https://devpost.com/api/hackathons?search=toulouse&status[]=upcoming&status[]=open"
    - "https://devpost.com/api/hackathons?search=mistral&status[]=upcoming&status[]=open"
    - "https://devpost.com/api/hackathons?search=mistral&status[]=ended"
    - "https://devpost.com/api/hackathons?search=hec&status[]=upcoming&status[]=open"
    - "https://devpost.com/api/hackathons?search=hec&status[]=ended"
    - "https://devpost.com/api/hackathons?search=42+ai&status[]=upcoming&status[]=open"
    - "https://devpost.com/api/hackathons?search=42+ai&status[]=ended"
    # Upcoming / open — what you can still join
    - "https://devpost.com/api/hackathons?search=ai&status[]=upcoming&status[]=open"
    - "https://devpost.com/api/hackathons?search=agents&status[]=upcoming&status[]=open"
    - "https://devpost.com/api/hackathons?search=agent&status[]=upcoming&status[]=open"
    - "https://devpost.com/api/hackathons?search=llm&status[]=upcoming&status[]=open"
    - "https://devpost.com/api/hackathons?search=generative&status[]=upcoming&status[]=open"
    - "https://devpost.com/api/hackathons?search=machine+learning&status[]=upcoming&status[]=open"
    - "https://devpost.com/api/hackathons?search=rag&status[]=upcoming&status[]=open"
    - "https://devpost.com/api/hackathons?search=mcp&status[]=upcoming&status[]=open"
    - "https://devpost.com/api/hackathons?search=claude&status[]=upcoming&status[]=open"
    - "https://devpost.com/api/hackathons?search=openai&status[]=upcoming&status[]=open"
    # Ended — gives access to project galleries (participants + github)
    - "https://devpost.com/api/hackathons?search=ai&status[]=ended"
    - "https://devpost.com/api/hackathons?search=agents&status[]=ended"
    - "https://devpost.com/api/hackathons?search=agent&status[]=ended"
    - "https://devpost.com/api/hackathons?search=llm&status[]=ended"
    - "https://devpost.com/api/hackathons?search=generative&status[]=ended"
    - "https://devpost.com/api/hackathons?search=machine+learning&status[]=ended"
    - "https://devpost.com/api/hackathons?search=rag&status[]=ended"
    - "https://devpost.com/api/hackathons?search=mcp&status[]=ended"
  max_pages: 3

mlh:
  enabled: true
  seasons_url: "https://mlh.io/seasons/2026/events"
  fallback_urls:
    - "https://mlh.io/seasons/2025/events"

hackerearth:
  enabled: true
  listing_url: "https://www.hackerearth.com/challenges/"
  api_url: "https://www.hackerearth.com/chrome-ext/events/"

hackernews:
  enabled: true
  algolia_url: "https://hn.algolia.com/api/v1/search_by_date"
  queries:
    # France-oriented
    - "paris hackathon ai"
    - "paris hackathon llm"
    - "hackathon france ai"
    - "mistral hackathon"
    - "station f hackathon"
    - "hec paris hackathon"
    - "42 paris hackathon"
    # Generic AI
    - "ai hackathon"
    - "agents hackathon"
    - "agent hackathon"
    - "llm hackathon"
    - "genai hackathon"
    - "rag hackathon"
    - "mcp hackathon"
    - "claude hackathon"
    - "openai hackathon"
    - "anthropic hackathon"

ai_tinkerers:
  enabled: true
  # Paris first — primary French hub
  urls:
    - "https://paris.aitinkerers.org/"
    # Other hubs kept for context (detector filters out non-FR)
    - "https://sanfrancisco.aitinkerers.org/"
    - "https://newyork.aitinkerers.org/"
    - "https://london.aitinkerers.org/"
    - "https://berlin.aitinkerers.org/"
    - "https://amsterdam.aitinkerers.org/"

luma:
  enabled: false
  note: "requires playwright or official API key — stub for now"

linkedin:
  enabled: false
  note: "search endpoints require authenticated cookie — stub for now"

eventbrite:
  enabled: false
  api_url: "https://www.eventbriteapi.com/v3/events/search/"
  queries:
    - "AI hackathon Paris"
    - "LLM hackathon France"
    - "agents hackathon France"

meetup:
  enabled: false
  note: "GraphQL requires login — stub for now"

reddit:
  enabled: false
  subreddits:
    - LocalLLaMA
    - MachineLearning
    - LLMDevs
    - AI_Agents

tavily:
  enabled: false
  queries:
    - "hackathon AI Paris 2026"
    - "hackathon LLM France 2026"
    - "hackathon agents France"
    - "hackathon Mistral Paris"
    - "hackathon Station F Paris"
    - "hackathon HEC Paris AI"
    - "hackathon 42 Paris AI"
    - "hackathon Lyon AI"
    - "hackathon Toulouse AI"
    - "hackathon Île-de-France intelligence artificielle"
