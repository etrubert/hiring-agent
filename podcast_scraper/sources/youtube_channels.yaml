# YouTube channels (handle or channel ID).
# Format: list of entries with `name` and `handle` (preferred) or `channel_id`.
# Current focus: French-language AI / tech / data / engineering podcasts.
# Kept a few top US channels at the end — the FR language filter drops
# English episodes automatically, but keeping them catches FR interviews
# on international shows (ex: Mistral on Latent Space).
